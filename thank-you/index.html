<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | OfferLaunch</title>
  <link rel="stylesheet" href="../fanbasis-styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../favicon/OL fav.png">
  <script>
    if (typeof fbq === 'function') {
      fbq('track', 'SubmitApplication');
    }
  </script>
</head>
<body class="thank-you-page">
  <section class="thank-you-page__hero hero-v2 ethereal-section">
    <div class="ethereal-bg ethereal-bg--hero" aria-hidden="true">
      <div class="ethereal-bg__shadow ethereal-bg__shadow--animated"></div>
      <div class="ethereal-bg__noise"></div>
    </div>

    <div class="thank-you-page__wrap">
      <a href="/" class="thank-you-page__logo" aria-label="OfferLaunch home">
        <img
          src="../offer-launch-assets/Asset 2.png"
          alt="OfferLaunch"
          class="thank-you-page__logo-img"
          width="140"
          height="25"
        >
      </a>

      <main class="thank-you-page__main">
        <div class="thank-you-page__icon" aria-hidden="true">✓</div>

        <h1 class="thank-you-page__headline">Thanks for submitting</h1>
        <p class="thank-you-page__message">
          Someone from our team will be in contact soon.
        </p>

        <p class="thank-you-page__contact">
          For any urgent questions, please reach out to
          <a href="mailto:team@offerlaunch.ai" class="thank-you-page__email">team@offerlaunch.ai</a>.
        </p>
      </main>

      <footer class="thank-you-page__legal">
        <a href="/privacy">Privacy Policy</a>
        <span aria-hidden="true">·</span>
        <a href="/terms">Terms of Service</a>
      </footer>
    </div>
  </section>

  <script src="../fanbasis-script.js"></script>
</body>
</html>
