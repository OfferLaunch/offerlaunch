<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfferLaunch - Login</title>
    <link rel="stylesheet" href="fanbasis-styles.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon/OL fav.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="site-header-sticky">
        <header class="site-header" id="site-header">
            <nav class="site-header__nav">
                <a href="index" class="site-header__logo" aria-label="OfferLaunch home">
                    <img src="offer-launch-assets/Asset 2.png" alt="OfferLaunch" class="site-header__logo-img" width="176" height="32">
                </a>
                <div class="site-header__desktop">
                    <a href="index#pillars" class="site-header__link">Consulting</a>
                    <a href="index#about" class="site-header__link">About</a>
                    <a href="business-apply" class="site-header__btn site-header__btn--primary">Get Started</a>
                </div>
                <button type="button" class="site-header__menu-btn" id="site-header-menu-btn" aria-label="Open menu" aria-expanded="false" aria-controls="site-header-mobile">
                    <svg class="menu-toggle-icon" width="20" height="20" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path class="menu-toggle-icon__path-a" d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22"></path>
                        <path d="M7 16 27 16"></path>
                    </svg>
                </button>
            </nav>
            <div class="site-header__mobile" id="site-header-mobile" hidden>
                <div class="site-header__mobile-inner" data-slot="closed">
                    <div class="site-header__mobile-links">
                        <a href="index#pillars" class="site-header__mobile-link">Consulting</a>
                        <a href="index#about" class="site-header__mobile-link">About</a>
                    </div>
                    <div class="site-header__mobile-actions">
                        <a href="business-apply" class="site-header__btn site-header__btn--primary site-header__btn--block">Get Started</a>
                    </div>
                </div>
            </div>
        </header>
    </div>

    <main class="login-page">
        <div class="login-container">
            <div class="login-content">
                <h1>Welcome Back</h1>
                <p class="login-subtitle">Access your comprehensive audit dashboard</p>
                
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" required placeholder="Enter your email">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" required placeholder="Enter your password">
                            <button type="button" class="toggle-password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-primary login-btn">
                        <span>Login to Dashboard</span>
                    </button>
                </form>

                <div class="login-footer">
                    <p>Don't have an account? <a href="business-apply">Get started with OfferLaunch</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="fanbasis-script.js"></script>
    <script>
        // Toggle password visibility
        const togglePassword = document.querySelector('.toggle-password');
        const passwordInput = document.querySelector('#password');
        
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Add loading state
            const submitBtn = this.querySelector('.login-btn');
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            submitBtn.disabled = true;

            // Simulate login process
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        });
    </script>
</body>
</html>
